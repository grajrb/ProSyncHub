apiVersion: apps/v1
kind: Deployment
metadata:
  name: prosync-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prosync-backend
  template:
    metadata:
      labels:
        app: prosync-backend
    spec:
      containers:
        - name: backend
          image: <BACKEND_IMAGE>
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
            # Add DB/Redis/Cosmos connection strings as needed
---
apiVersion: v1
kind: Service
metadata:
  name: prosync-backend
spec:
  type: ClusterIP
  selector:
    app: prosync-backend
  ports:
    - port: 5000
      targetPort: 5000
