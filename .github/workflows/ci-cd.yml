# ProSyncHub CI/CD Pipeline for Azure
# - Runs tests, lint, security checks
# - Builds and pushes Docker images
# - Deploys to Azure Web App (Linux) or AKS

name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Run unit tests
        run: npm test -- --coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Security audit
        run: npm audit --audit-level=high || true
      - name: Build client
        run: |
          cd ProSyncHub/client
          npm ci
          npm run build
      - name: Build server
        run: |
          cd ProSyncHub/server
          npm ci
          npm run build

  codeql:
    name: Analyze (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'typescript' ]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  dockerize-deploy:
    needs: [build-test, codeql]
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and push Docker images
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/prosynchub-client:latest -f ProSyncHub/client/Dockerfile .
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/prosynchub-server:latest -f ProSyncHub/server/Dockerfile .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/prosynchub-client:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/prosynchub-server:latest
      - name: Azure Web App Deploy (example)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/prosynchub-client:latest,${{ secrets.ACR_LOGIN_SERVER }}/prosynchub-server:latest
      # For AKS, use kubectl or helm deploy steps here
      - name: Manual approval for production deploy
        if: github.ref == 'refs/heads/main'
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: user1,user2
          minimum-approvals: 1

