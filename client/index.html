<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Example: Add a simple custom banner for development mode -->
    <script type="text/javascript">
      if (location.hostname === "localhost" || location.hostname === "127.0.0.1") {
      const banner = document.createElement('div');
      banner.style.cssText = "background:#222;color:#fff;padding:8px 0;text-align:center;font-size:14px;position:fixed;top:0;left:0;width:100%;z-index:9999;";
      banner.textContent = "Development Mode";
      document.body.prepend(banner);
      document.body.style.paddingTop = "40px";
      }
    </script>
  </body>
</html>
