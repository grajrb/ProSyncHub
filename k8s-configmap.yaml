apiVersion: v1
kind: ConfigMap
metadata:
  name: prosync-config
  namespace: default
data:
  NODE_ENV: "production"
  PORT: "3001"
  # MongoDB Configuration
  MONGODB_HOST: "mongodb"
  MONGODB_PORT: "27017"
  MONGODB_DB_NAME: "prosync"
  # Redis Configuration  
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  # JWT Configuration
  JWT_EXPIRES_IN: "24h"
  # Cache TTL settings
  ASSET_CACHE_TTL_SECONDS: "3600"  # 1 hour
  USER_SESSION_TTL_SECONDS: "86400"  # 24 hours
  # Rate Limiting Settings
  RATE_LIMIT_MAX_REQUESTS: "60"
  RATE_LIMIT_WINDOW_MS: "60000"  # 1 minute
  # WebSocket Configuration
  WS_HEARTBEAT_INTERVAL: "30000"  # 30 seconds
