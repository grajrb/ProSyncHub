apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prosync-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: prosynchub.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prosync-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: prosync-backend
                port:
                  number: 5000
